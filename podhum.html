<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Love 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    overflow: hidden;
}

/* Container */
.container {
    background: white;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    width: 320px;
    margin: auto;
    margin-top: 80px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.hidden { display: none; }

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 8px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
}

/* Heart animation */
.heart {
    font-size: 40px;
    animation: beat 1s infinite;
}
@keyframes beat {
    50% { transform: scale(1.3); }
}

/* Falling roses */
.rose {
    position: absolute;
    top: -50px;
    font-size: 25px;
    animation: fall linear infinite;
}
@keyframes fall {
    to {
        transform: translateY(100vh);
    }
}

/* Typing effect */
.typing {
    font-size: 18px;
    color: #ff4d6d;
    border-right: 2px solid;
    white-space: nowrap;
    overflow: hidden;
}

/* Moving NO button */
#noBtn {
    position: relative;
}
</style>
</head>

<body>

<!-- 🌹 ROSES -->
<script>
for (let i = 0; i < 20; i++) {
    let rose = document.createElement("div");
    rose.className = "rose";
    rose.innerHTML = "🌹";
    rose.style.left = Math.random() * 100 + "vw";
    rose.style.animationDuration = (3 + Math.random()*5) + "s";
    document.body.appendChild(rose);
}
</script>

<!-- LOGIN -->
<div class="container" id="loginBox">
    <h2>Unlock My Heart 💖</h2>
    <input type="text" id="name" placeholder="Your name"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- PROPOSAL -->
<div class="container hidden" id="proposalBox">
    <h2>Hey Love 💕</h2>
    <p>You are my happiness 💖<br>Will you be mine forever?</p>
    <div class="heart">❤️</div>
    <button onclick="accept()">Yes 💖</button>
    <button id="noBtn" onmouseover="moveNo()">No 😢</button>
</div>

<!-- ACCEPT PAGE -->
<div class="container hidden" id="acceptBox">
    <h2>Forever Starts Now 💍</h2>
    <p class="typing" id="loveText"></p>
    <div class="heart">❤️❤️</div>
</div>

<!-- REJECT PAGE -->
<div class="container hidden" id="rejectBox">
    <h2>It's Okay 💔</h2>
    <p>
        You may deserve someone even better 🌸<br><br>
        But I will always respect you 💖
    </p>
</div>

<script>
const correctName = "mugil"; // change
const correctPassword = "1234"; // change

function show(id) {
    document.querySelectorAll(".container").forEach(el => el.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

function login() {
    let n = document.getElementById("name").value;
    let p = document.getElementById("password").value;

    if (n === correctName && p === correctPassword) {
        show("proposalBox");
    } else {
        document.getElementById("error").innerText = "Wrong 😢";
    }
}

/* 😄 NO button escape */
function moveNo() {
    let btn = document.getElementById("noBtn");
    btn.style.position = "absolute";
    btn.style.left = Math.random()*80 + "%";
    btn.style.top = Math.random()*80 + "%";
}

/* 💖 ACCEPT */
function accept() {
    show("acceptBox");
    startTyping();
}

/* 💌 Typing effect */
let text = "From today, our story begins... I will love you forever ❤️";
let index = 0;

function startTyping() {
    let el = document.getElementById("loveText");
    el.innerHTML = "";
    let interval = setInterval(() => {
        if (index < text.length) {
            el.innerHTML += text.charAt(index);
            index++;
        } else {
            clearInterval(interval);
        }
    }, 80);
}
</script>

</body>
</html>
